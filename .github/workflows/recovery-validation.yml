name: Full-stack recovery validation

on:
  pull_request:

jobs:
  recovery-validation:
    name: Recovery certification + real restore drill
    runs-on: ubuntu-latest
    services:
      postgres:
        image: pgvector/pgvector:pg17
        env:
          POSTGRES_USER: postgres
          POSTGRES_PASSWORD: postgres
          POSTGRES_DB: nirvet
        ports: ["5432:5432"]
        options: >-
          --health-cmd "pg_isready -U postgres -d nirvet"
          --health-interval 5s --health-timeout 3s --health-retries 10
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-go@v5
        with:
          go-version-file: backend/go.mod
          cache-dependency-path: backend/go.sum
      - name: Guard — recovery source formatting
        working-directory: backend
        run: |
          unformatted=$(gofmt -l internal/platform/recovery cmd/api/recovery_gate.go)
          test -z "$unformatted" || { echo "$unformatted"; exit 1; }
      - name: Guard — restored serving is certification-gated
        working-directory: backend
        run: bash scripts/check-recovery-serving-gate.sh
      - name: Mutation proof — deleting the startup check turns gate RED
        working-directory: backend
        run: |
          cp cmd/api/recovery_gate.go "$RUNNER_TEMP/recovery_gate.go"
          trap 'cp "$RUNNER_TEMP/recovery_gate.go" cmd/api/recovery_gate.go' EXIT
          sed -i 's/recovery.RequireServingFromEnv()/nil/' cmd/api/recovery_gate.go
          if bash scripts/check-recovery-serving-gate.sh; then
            echo "recovery serving fence failed open under mutation"
            exit 1
          fi
          cp "$RUNNER_TEMP/recovery_gate.go" cmd/api/recovery_gate.go
          bash scripts/check-recovery-serving-gate.sh
      - name: Apply production migrations to source
        working-directory: backend
        env:
          NIRVET_MIGRATE_DATABASE_URL: postgres://postgres:postgres@localhost:5432/nirvet?sslmode=disable
        run: go run ./cmd/migrate
      - name: Seed two-tenant recovery markers
        env:
          PGPASSWORD: postgres
        run: |
          psql -h localhost -U postgres -d nirvet -v ON_ERROR_STOP=1 <<'SQL'
          INSERT INTO tenants (id,name,status) VALUES
            ('aaaaaaaa-aaaa-aaaa-aaaa-aaaaaaaaaaaa','Recovery Tenant A','active'),
            ('bbbbbbbb-bbbb-bbbb-bbbb-bbbbbbbbbbbb','Recovery Tenant B','active');
          INSERT INTO incidents (id,tenant_id,title,severity,category,stage) VALUES
            ('aaaaaaaa-0000-0000-0000-000000000001','aaaaaaaa-aaaa-aaaa-aaaa-aaaaaaaaaaaa','Recovery marker A','low','recovery','new'),
            ('bbbbbbbb-0000-0000-0000-000000000001','bbbbbbbb-bbbb-bbbb-bbbb-bbbbbbbbbbbb','Recovery marker B','low','recovery','new');
          INSERT INTO audit_log (tenant_id,action,target,request_id) VALUES
            ('aaaaaaaa-aaaa-aaaa-aaaa-aaaaaaaaaaaa','recovery.seed','incident:a','recovery-seed-a'),
            ('bbbbbbbb-bbbb-bbbb-bbbb-bbbbbbbbbbbb','recovery.seed','incident:b','recovery-seed-b');
          SQL
      - name: Local blob backup → wipe → restore
        run: |
          mkdir -p "$RUNNER_TEMP/blob-source/evidence"
          printf '%s' 'nirvet-recovery-blob-marker' > "$RUNNER_TEMP/blob-source/evidence/marker.bin"
          expected=$(sha256sum "$RUNNER_TEMP/blob-source/evidence/marker.bin" | awk '{print $1}')
          tar -C "$RUNNER_TEMP/blob-source" -czf "$RUNNER_TEMP/blob-backup.tgz" .
          rm -rf "$RUNNER_TEMP/blob-source"
          mkdir -p "$RUNNER_TEMP/blob-restored"
          tar -C "$RUNNER_TEMP/blob-restored" -xzf "$RUNNER_TEMP/blob-backup.tgz"
          actual=$(sha256sum "$RUNNER_TEMP/blob-restored/evidence/marker.bin" | awk '{print $1}')
          test "$actual" = "$expected"
          echo "NIRVET_RECOVERY_BLOB_EVIDENCE=blob marker restored with sha256=$actual" >> "$GITHUB_ENV"
      - name: PostgreSQL backup → wipe target → restore
        run: |
          container=$(docker ps --filter ancestor=pgvector/pgvector:pg17 --format '{{.ID}}' | head -n1)
          test -n "$container"
          docker exec "$container" pg_dump -U postgres -d nirvet -Fc > "$RUNNER_TEMP/nirvet.dump"
          docker exec "$container" dropdb -U postgres --if-exists nirvet_restored
          docker exec "$container" createdb -U postgres nirvet_restored
          docker exec -i "$container" pg_restore -U postgres -d nirvet_restored --no-owner --exit-on-error < "$RUNNER_TEMP/nirvet.dump"
      - name: Recovery certification and corruption controls
        working-directory: backend
        env:
          NIRVET_OWNER_TEST_DATABASE_URL: postgres://postgres:postgres@localhost:5432/nirvet_restored?sslmode=disable
          NIRVET_RESTORED_OWNER_DATABASE_URL: postgres://postgres:postgres@localhost:5432/nirvet_restored?sslmode=disable
          NIRVET_RESTORED_APP_DATABASE_URL: postgres://nirvet_app:nirvet_app@localhost:5432/nirvet_restored?sslmode=disable
        run: go test -race -count=1 ./internal/platform/recovery ./cmd/api
