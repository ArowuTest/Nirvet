name: Offline content lifecycle

on:
  pull_request:

jobs:
  content-lifecycle:
    name: Signed content verify-before-parse + boundary fence
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-go@v5
        with:
          go-version-file: backend/go.mod
          cache-dependency-path: backend/go.sum
      - name: Guard — content import remains data-only
        working-directory: backend
        run: bash scripts/check-content-import-boundary.sh
      - name: Signed package falsification suite
        working-directory: backend
        run: go test -v -count=1 ./internal/platform/contentlifecycle
