name: CI

on:
  push:
    branches: [main]
  pull_request:

jobs:
  backend:
    name: Backend (build, vet, test + RLS integration)
    runs-on: ubuntu-latest
    services:
      postgres:
        image: postgres:17
        env:
          POSTGRES_USER: postgres
          POSTGRES_PASSWORD: postgres
          POSTGRES_DB: nirvet
        ports: ["5432:5432"]
        options: >-
          --health-cmd "pg_isready -U postgres -d nirvet"
          --health-interval 5s --health-timeout 3s --health-retries 10
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-go@v5
        with:
          go-version-file: backend/go.mod
          cache-dependency-path: backend/go.sum
      - name: Build & vet
        working-directory: backend
        run: |
          go build ./...
          go vet ./...
      - name: Guard — gofmt (no formatting drift)
        working-directory: backend
        run: |
          unformatted=$(gofmt -l .)
          if [ -n "$unformatted" ]; then
            echo "These files are not gofmt-clean; run 'gofmt -w .':"
            echo "$unformatted"
            exit 1
          fi
      - name: Guard — outbound HTTP must use netsafe.SafeClient (SSRF)
        working-directory: backend
        run: bash scripts/check-outbound-http.sh
      - name: Guard — SECURITY DEFINER functions must REVOKE PUBLIC (RLS-bypass)
        working-directory: backend
        run: bash scripts/check-security-definer-revoke.sh
      - name: Guard — posture store must not import content (MA-4 metadata-only)
        working-directory: backend
        run: bash scripts/check-posture-no-content-import.sh
      - name: Guard — PDF renderer must be zero-egress (no net/http, os/exec, HTML render)
        working-directory: backend
        run: bash scripts/check-pdf-render-fence.sh
      - name: Guard — session tokens minted only via the MintSession chokepoint (MA-SR-9 stamp completeness)
        working-directory: backend
        run: bash scripts/check-session-mint-single-path.sh
      - name: Guard — connector credential decrypts audited via Vault.Open (ADR-0004 §6 / GC-1)
        working-directory: backend
        run: bash scripts/check-connector-decrypt-audit.sh
      - name: Guard — customer read chain serves only readmodel projections (audience over-disclosure)
        working-directory: backend
        run: bash scripts/check-audience-projection.sh
      - name: Guard — every seeded playbook action resolves to a catalog action_key (no silently-broken content)
        working-directory: backend
        run: bash scripts/check-playbook-actions-cataloged.sh
      - name: Guard — LLM egress flows only through the completeExternal redaction chokepoint (#188 AI-egress)
        working-directory: backend
        run: bash scripts/check-ai-egress-redaction.sh
      - name: Guard — every AI-008 eval category is seeded + defined (§6.12 governance, no silent gap)
        working-directory: backend
        run: bash scripts/check-ai-eval-categories.sh
      - name: Guard — authority_policies written only via the guarded governance usecase (crown-jewel authz chokepoint)
        working-directory: backend
        run: bash scripts/check-authority-single-path.sh
      - name: Guard — every mutating route is authz-guarded or explicitly allowlisted (no silent authz bypass)
        working-directory: backend
        run: bash scripts/check-route-authz-coverage.sh
      - name: Guard — force-MFA policy is consumed at the MintSession chokepoint (no decorative mfa.enforce v2)
        working-directory: backend
        run: bash scripts/check-mfa-enforcement-consumed.sh
      - name: Guard — the AI copilot never executes a response action (proposes only; human promotes to SOAR)
        working-directory: backend
        run: bash scripts/check-ai-no-direct-execution.sh
      - name: Guard — the AI copilot's agentic tool set is a closed read-only allowlist (read agency, never execute)
        working-directory: backend
        run: bash scripts/check-ai-tool-registry.sh
      - name: Guard — retention has ONE window producer feeding the delete (floor/ceiling/arm/legal-hold single-path)
        working-directory: backend
        run: bash scripts/check-retention-window-single-path.sh
      - name: Guard — KMS providers are wrap/unwrap-only (KEK never leaves the backend; crypto funnels through envelopeCipher)
        working-directory: backend
        run: bash scripts/check-kms-provider-boundary.sh
      - name: Guard — deployment packaging is secure (no secret in chart, nonroot/readonly, default-deny netpol, digest-pinned, /metrics monitoring-only)
        working-directory: backend
        run: bash scripts/check-deploy-security.sh
      - name: Apply migrations
        working-directory: backend
        env:
          NIRVET_MIGRATE_DATABASE_URL: postgres://postgres:postgres@localhost:5432/nirvet?sslmode=disable
        run: go run ./cmd/migrate
      - name: Test (unit + integration, race detector)
        working-directory: backend
        env:
          # App connects as the non-owner RLS role created by the migration.
          NIRVET_TEST_DATABASE_URL: postgres://nirvet_app:nirvet_app@localhost:5432/nirvet?sslmode=disable
          # Owner/superuser DSN — only the AssertRLSConstrainedRole refuse-path test uses it (proves an
          # RLS-bypassing role is rejected). The runtime app never connects with this.
          NIRVET_OWNER_TEST_DATABASE_URL: postgres://postgres:postgres@localhost:5432/nirvet?sslmode=disable
        run: go test -race -count=1 ./...

  frontend:
    name: Frontend (build + typecheck)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: "22"
          cache: npm
          cache-dependency-path: frontend/package-lock.json
      - name: Install & build
        working-directory: frontend
        env:
          NEXT_TELEMETRY_DISABLED: "1"
        run: |
          npm ci
          npm run build

  secrets:
    name: Secret scan
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
      - uses: gitleaks/gitleaks-action@v2

  security-scan:
    name: Security scan (gosec + govulncheck)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-go@v5
        with:
          go-version-file: backend/go.mod
          cache-dependency-path: backend/go.sum
      # Known-vulnerable dependencies / stdlib (R2 low). Versions are PINNED (not @latest)
      # so a scanner release cannot silently change results or break a build between runs;
      # bump these tags deliberately (R3 CI-pin). Both pinned to Go-1.25-compatible releases
      # (older govulncheck/gosec pulled x/tools@v0.23, which fails to compile on Go 1.25 with
      # "invalid array length" — Jul 2026 bump).
      - name: govulncheck
        working-directory: backend
        run: |
          go install golang.org/x/vuln/cmd/govulncheck@v1.6.0
          govulncheck ./...
      # Static security analysis; high-severity findings fail the build (lower-severity
      # style nits are reported but don't gate, to avoid drowning the signal).
      - name: gosec
        working-directory: backend
        run: |
          go install github.com/securego/gosec/v2/cmd/gosec@v2.27.1
          # G115 (integer-overflow conversions) is excluded: gosec flags every int→intN cast, but ours are
          # bounded (TOTP counters, array/param lengths, protocol fields) — it is the canonically-noisy rule
          # and produces only false positives here. All other high-severity rules still gate the build.
          gosec -exclude-generated -exclude=G115 -severity high -confidence medium ./...
