name: CI

on:
  push:
    branches: [main]
  pull_request:

jobs:
  backend:
    name: Backend (build, vet, test + RLS integration)
    runs-on: ubuntu-latest
    services:
      postgres:
        image: postgres:17
        env:
          POSTGRES_USER: postgres
          POSTGRES_PASSWORD: postgres
          POSTGRES_DB: nirvet
        ports: ["5432:5432"]
        options: >-
          --health-cmd "pg_isready -U postgres -d nirvet"
          --health-interval 5s --health-timeout 3s --health-retries 10
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-go@v5
        with:
          go-version-file: backend/go.mod
          cache-dependency-path: backend/go.sum
      - name: Build & vet
        working-directory: backend
        run: |
          go build ./...
          go vet ./...
      - name: Guard — gofmt (no formatting drift)
        working-directory: backend
        run: |
          unformatted=$(gofmt -l .)
          if [ -n "$unformatted" ]; then
            echo "These files are not gofmt-clean; run 'gofmt -w .':"
            echo "$unformatted"
            exit 1
          fi
      - name: Guard — outbound HTTP must use netsafe.SafeClient (SSRF)
        working-directory: backend
        run: bash scripts/check-outbound-http.sh
      - name: Guard — SECURITY DEFINER functions must REVOKE PUBLIC (RLS-bypass)
        working-directory: backend
        run: bash scripts/check-security-definer-revoke.sh
      - name: Guard — posture store must not import content (MA-4 metadata-only)
        working-directory: backend
        run: bash scripts/check-posture-no-content-import.sh
      - name: Guard — PDF renderer must be zero-egress (no net/http, os/exec, HTML render)
        working-directory: backend
        run: bash scripts/check-pdf-render-fence.sh
      - name: Apply migrations
        working-directory: backend
        env:
          NIRVET_MIGRATE_DATABASE_URL: postgres://postgres:postgres@localhost:5432/nirvet?sslmode=disable
        run: go run ./cmd/migrate
      - name: Test (unit + integration, race detector)
        working-directory: backend
        env:
          # App connects as the non-owner RLS role created by the migration.
          NIRVET_TEST_DATABASE_URL: postgres://nirvet_app:nirvet_app@localhost:5432/nirvet?sslmode=disable
        run: go test -race -count=1 ./...

  frontend:
    name: Frontend (build + typecheck)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: "22"
          cache: npm
          cache-dependency-path: frontend/package-lock.json
      - name: Install & build
        working-directory: frontend
        env:
          NEXT_TELEMETRY_DISABLED: "1"
        run: |
          npm ci
          npm run build

  secrets:
    name: Secret scan
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
      - uses: gitleaks/gitleaks-action@v2

  security-scan:
    name: Security scan (gosec + govulncheck)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-go@v5
        with:
          go-version-file: backend/go.mod
          cache-dependency-path: backend/go.sum
      # Known-vulnerable dependencies / stdlib (R2 low). Versions are PINNED (not @latest)
      # so a scanner release cannot silently change results or break a build between runs;
      # bump these tags deliberately (R3 CI-pin).
      - name: govulncheck
        working-directory: backend
        run: |
          go install golang.org/x/vuln/cmd/govulncheck@v1.1.3
          govulncheck ./...
      # Static security analysis; high-severity findings fail the build (lower-severity
      # style nits are reported but don't gate, to avoid drowning the signal).
      - name: gosec
        working-directory: backend
        run: |
          go install github.com/securego/gosec/v2/cmd/gosec@v2.21.4
          gosec -exclude-generated -severity high -confidence medium ./...
