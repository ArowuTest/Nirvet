# Local development infrastructure for Nirvet.
# Postgres 17 (ADR-0001/0002 system of record). Bring up with:
#   docker compose -f deploy/docker-compose.yml up -d
services:
  postgres:
    image: postgres:17
    container_name: nirvet-postgres
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
      POSTGRES_DB: nirvet
    ports:
      # Host 5433 to coexist with a local Postgres already on 5432.
      - "5433:5432"
    volumes:
      - nirvet_pg:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres -d nirvet"]
      interval: 5s
      timeout: 3s
      retries: 10

volumes:
  nirvet_pg:
