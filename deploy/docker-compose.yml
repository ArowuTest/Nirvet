# Local development infrastructure for Nirvet.
# Postgres 17 (ADR-0001/0002 system of record) + ClickHouse (ADR-0002 V1 telemetry
# hot store, optional). Bring up with:
#   docker compose -f deploy/docker-compose.yml up -d
# Enable the ClickHouse event store by setting:
#   NIRVET_CLICKHOUSE_DSN=clickhouse://nirvet:nirvet@localhost:9000/nirvet
services:
  postgres:
    image: postgres:17
    container_name: nirvet-postgres
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
      POSTGRES_DB: nirvet
    ports:
      # Host 5433 to coexist with a local Postgres already on 5432.
      - "5433:5432"
    volumes:
      - nirvet_pg:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres -d nirvet"]
      interval: 5s
      timeout: 3s
      retries: 10

  clickhouse:
    image: clickhouse/clickhouse-server:24.8
    container_name: nirvet-clickhouse
    environment:
      CLICKHOUSE_DB: nirvet
      CLICKHOUSE_USER: nirvet
      CLICKHOUSE_PASSWORD: nirvet
      CLICKHOUSE_DEFAULT_ACCESS_MANAGEMENT: "1"
    ports:
      - "8123:8123" # HTTP
      - "9000:9000" # native
    ulimits:
      nofile:
        soft: 262144
        hard: 262144
    volumes:
      - nirvet_ch:/var/lib/clickhouse
    healthcheck:
      test: ["CMD-SHELL", "wget -qO- http://localhost:8123/ping || exit 1"]
      interval: 5s
      timeout: 3s
      retries: 10

  # Optional: global rate limiting across API replicas. Enable with
  #   NIRVET_REDIS_ADDR=localhost:6381
  redis:
    image: redis:7-alpine
    container_name: nirvet-redis
    ports:
      - "6381:6379"
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 3s
      retries: 10

  # Optional: durable ingestion queue (JetStream) at scale. Enable with
  #   NIRVET_NATS_URL=nats://localhost:4222
  nats:
    image: nats:2.10
    container_name: nirvet-nats
    command: ["-js"]
    ports:
      - "4222:4222"

volumes:
  nirvet_pg:
  nirvet_ch:
