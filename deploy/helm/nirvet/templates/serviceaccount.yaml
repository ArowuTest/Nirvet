apiVersion: v1
kind: ServiceAccount
metadata:
  name: {{ include "nirvet.fullname" . }}
  labels: {{- include "nirvet.labels" . | nindent 4 }}
# A plain web service needs no Kubernetes API access — do NOT auto-mount the SA token (least privilege, 2c).
automountServiceAccountToken: {{ .Values.serviceAccount.automountToken }}
# No Role/ClusterRole is created: the app calls no Kubernetes API.
