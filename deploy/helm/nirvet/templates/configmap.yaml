apiVersion: v1
kind: ConfigMap
metadata:
  name: {{ include "nirvet.fullname" . }}-config
  labels: {{- include "nirvet.labels" . | nindent 4 }}
data:
  # NON-SECRET config only. Secret env (NIRVET_DATABASE_URL with creds, NIRVET_JWT_SECRET, NIRVET_SECRET_MASTER_KEY,
  # NIRVET_VAULT_TOKEN, NIRVET_CLICKHOUSE_DSN) come from the operator Secret via envFrom — never from this ConfigMap.
  NIRVET_ENV: {{ .Values.config.env | quote }}
  NIRVET_HTTP_ADDR: {{ .Values.config.httpAddr | quote }}
  NIRVET_CORS_ORIGIN: {{ .Values.config.corsOrigin | quote }}
  NIRVET_AI_MODEL: {{ .Values.config.aiModel | quote }}
  NIRVET_VAULT_ADDR: {{ .Values.config.vaultAddr | quote }}
  NIRVET_VAULT_MOUNT: {{ .Values.config.vaultMount | quote }}
  NIRVET_CRYPTO_PROVIDER: {{ .Values.config.cryptoProvider | quote }}
  NIRVET_CRYPTO_REQUIRE_KMS: {{ .Values.config.requireKMS | quote }}
