apiVersion: apps/v1
kind: Deployment
metadata:
  name: {{ include "nirvet.fullname" . }}-api
  labels: {{- include "nirvet.labels" . | nindent 4 }}
spec:
  replicas: {{ .Values.replicaCount }}
  selector:
    matchLabels: {{- include "nirvet.selectorLabels" . | nindent 6 }}
      app.kubernetes.io/component: api
  template:
    metadata:
      labels: {{- include "nirvet.selectorLabels" . | nindent 8 }}
        app.kubernetes.io/component: api
    spec:
      serviceAccountName: {{ include "nirvet.fullname" . }}
      automountServiceAccountToken: {{ .Values.serviceAccount.automountToken }}
      securityContext: {{- include "nirvet.podSecurityContext" . | nindent 8 }}
      containers:
        - name: api
          image: {{ include "nirvet.image" . }}
          imagePullPolicy: {{ .Values.image.pullPolicy }}
          command: ["/app/api"]
          securityContext: {{- include "nirvet.containerSecurityContext" . | nindent 12 }}
          ports:
            - name: http
              containerPort: 8080
          envFrom: {{- include "nirvet.envFrom" . | nindent 12 }}
          readinessProbe:
            httpGet: { path: /readyz, port: http }
            initialDelaySeconds: 5
            periodSeconds: 10
          livenessProbe:
            httpGet: { path: /healthz, port: http }
            initialDelaySeconds: 10
            periodSeconds: 20
          resources: {{- toYaml .Values.resources | nindent 12 }}
          volumeMounts:
            - name: tmp
              mountPath: /tmp
      volumes:
        # readOnlyRootFilesystem is true → a writable emptyDir only where the process needs scratch space.
        - name: tmp
          emptyDir: {}
