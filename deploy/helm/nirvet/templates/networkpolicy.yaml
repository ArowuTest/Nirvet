{{- if .Values.networkPolicy.enabled }}
# Default-DENY for all pods in the namespace: nothing is allowed unless an explicit rule below permits it (2d).
apiVersion: networking.k8s.io/v1
kind: NetworkPolicy
metadata:
  name: {{ include "nirvet.fullname" . }}-default-deny
  labels: {{- include "nirvet.labels" . | nindent 4 }}
spec:
  podSelector: {}
  policyTypes: [Ingress, Egress]
  # no ingress/egress rules → deny all
---
# Ingress: allow traffic to the API pods on 8080 only.
apiVersion: networking.k8s.io/v1
kind: NetworkPolicy
metadata:
  name: {{ include "nirvet.fullname" . }}-api-ingress
  labels: {{- include "nirvet.labels" . | nindent 4 }}
spec:
  podSelector:
    matchLabels: {{- include "nirvet.selectorLabels" . | nindent 6 }}
      app.kubernetes.io/component: api
  policyTypes: [Ingress]
  ingress:
    - ports:
        - { protocol: TCP, port: 8080 }
---
# /metrics is on 8080 but MUST be scraped ONLY from the monitoring namespace — allow that source explicitly; the
# default-deny keeps it off the public ingress path.
apiVersion: networking.k8s.io/v1
kind: NetworkPolicy
metadata:
  name: {{ include "nirvet.fullname" . }}-metrics-monitoring-only
  labels: {{- include "nirvet.labels" . | nindent 4 }}
spec:
  podSelector:
    matchLabels: {{- include "nirvet.selectorLabels" . | nindent 6 }}
      app.kubernetes.io/component: api
  policyTypes: [Ingress]
  ingress:
    - from:
        - namespaceSelector:
            matchLabels: { kubernetes.io/metadata.name: {{ .Values.metrics.monitoringNamespace | quote }} }
      ports:
        - { protocol: TCP, port: 8080 }
---
# Egress: app/worker/migrate may reach ONLY the self-hosted data-plane deps (postgres/clickhouse/nats/redis/vault/
# object-store) on the CIDRs the operator declares, plus DNS. In the air-gap profile there is NO public-internet
# egress rule — so telemetry / update-checks / a public LLM endpoint are structurally unreachable (no phone-home).
apiVersion: networking.k8s.io/v1
kind: NetworkPolicy
metadata:
  name: {{ include "nirvet.fullname" . }}-egress
  labels: {{- include "nirvet.labels" . | nindent 4 }}
spec:
  podSelector: {{- include "nirvet.selectorLabels" . | nindent 4 }}
  policyTypes: [Egress]
  egress:
    # DNS
    - to:
        - namespaceSelector: {}
      ports:
        - { protocol: UDP, port: 53 }
        - { protocol: TCP, port: 53 }
    # Self-hosted dependencies on the operator-declared CIDRs.
    - to:
        {{- range .Values.networkPolicy.dependencyCIDRs }}
        - ipBlock: { cidr: {{ . | quote }} }
        {{- end }}
      ports:
        - { protocol: TCP, port: 5432 }   # postgres
        - { protocol: TCP, port: 9000 }   # clickhouse
        - { protocol: TCP, port: 4222 }   # nats
        - { protocol: TCP, port: 6379 }   # redis
        - { protocol: TCP, port: 8200 }   # vault
        - { protocol: TCP, port: 443 }    # object-store (in-cluster MinIO/S3 gateway)
  {{- if not .Values.networkPolicy.airgap }}
  # NON-air-gap profiles MAY reach the public internet (e.g. cloud KMS, hosted LLM). The air-gap profile omits this
  # block entirely, so egress is confined to the data plane above.
  {{- end }}
{{- /* Self-hosted LLM egress (GATE_SELF_HOSTED_LLM.md 1a) — a NARROW, explicit allow, ADDED to the app/worker
       egress ONLY when the operator configures an EXISTING external LLM host. Default-deny is preserved: unset ⇒
       this block renders nothing ⇒ no LLM egress. In-cluster LLM (1b) uses the pod-to-pod rules below instead and
       needs no external egress at all. */ -}}
{{- with .Values.ai }}{{- if and .selfHostedLLM (not .selfHostedLLM.enabled) .selfHostedLLM.egress.cidr }}
{{- if eq (.selfHostedLLM.egress.cidr | toString) "0.0.0.0/0" }}{{ fail "ai.selfHostedLLM.egress.cidr must be a specific host/CIDR, never 0.0.0.0/0 — that would re-open the default-deny egress" }}{{- end }}
{{- if not .selfHostedLLM.egress.port }}{{ fail "ai.selfHostedLLM.egress.cidr is set but egress.port is unset — the LLM egress must be a single specific port" }}{{- end }}
---
# Self-hosted LLM egress: exactly the operator's LLM host on the model port, from app/worker only. One rule, one
# host, one port — the model sees every prompt, so this is the tightest possible allow, and never 0.0.0.0/0.
apiVersion: networking.k8s.io/v1
kind: NetworkPolicy
metadata:
  name: {{ include "nirvet.fullname" $ }}-llm-egress
  labels: {{- include "nirvet.labels" $ | nindent 4 }}
spec:
  podSelector: {{- include "nirvet.selectorLabels" $ | nindent 4 }}
  policyTypes: [Egress]
  egress:
    - to:
        - ipBlock: { cidr: {{ .selfHostedLLM.egress.cidr | quote }} }
      ports:
        - { protocol: TCP, port: {{ .selfHostedLLM.egress.port }} }
{{- end }}{{- end }}
{{- /* In-cluster LLM segmentation (1b) — the LLM Service is reachable ONLY from app/worker pods, NEVER Ingress and
       NEVER other namespaces. The model sees every prompt+context, so a broadly-reachable LLM is a data-exfil
       surface. Egress stays inside the cluster (no external egress opened). */ -}}
{{- with .Values.ai }}{{- if and .selfHostedLLM .selfHostedLLM.enabled }}
---
# App/worker MAY reach the in-cluster LLM pod on the model port (pod-to-pod, stays inside the cluster).
apiVersion: networking.k8s.io/v1
kind: NetworkPolicy
metadata:
  name: {{ include "nirvet.fullname" $ }}-llm-app-egress
  labels: {{- include "nirvet.labels" $ | nindent 4 }}
spec:
  podSelector:
    matchExpressions:
      - { key: app.kubernetes.io/component, operator: In, values: [api, worker] }
    matchLabels: {{- include "nirvet.selectorLabels" $ | nindent 6 }}
  policyTypes: [Egress]
  egress:
    - to:
        - podSelector:
            matchLabels: {{- include "nirvet.selectorLabels" $ | nindent 14 }}
              app.kubernetes.io/component: llm
      ports:
        - { protocol: TCP, port: {{ .selfHostedLLM.modelPort }} }
---
# The LLM pod accepts traffic ONLY from app/worker pods of THIS release, on the model port. No Ingress, no other
# namespace (same-namespace podSelector, no namespaceSelector) — the model is not an exposed surface.
apiVersion: networking.k8s.io/v1
kind: NetworkPolicy
metadata:
  name: {{ include "nirvet.fullname" $ }}-llm-ingress
  labels: {{- include "nirvet.labels" $ | nindent 4 }}
spec:
  podSelector:
    matchLabels: {{- include "nirvet.selectorLabels" $ | nindent 6 }}
      app.kubernetes.io/component: llm
  policyTypes: [Ingress]
  ingress:
    - from:
        - podSelector:
            matchExpressions:
              - { key: app.kubernetes.io/component, operator: In, values: [api, worker] }
            matchLabels: {{- include "nirvet.selectorLabels" $ | nindent 14 }}
      ports:
        - { protocol: TCP, port: {{ .selfHostedLLM.modelPort }} }
{{- end }}{{- end }}
{{- end }}
