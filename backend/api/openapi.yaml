openapi: 3.1.0
info:
  title: Nirvet SOC Platform API
  version: "0.1.0"
  description: >
    Cyber Security Operations Platform API (SOCaaS/MDR/XDR/Sovereign/MSSP).
    All endpoints except health, metrics, login and webhook ingestion require a
    Bearer JWT. Every request is tenant-scoped (RLS) and role-gated (RBAC).
servers:
  - url: http://localhost:8080
    description: Local
components:
  securitySchemes:
    bearerAuth:
      type: http
      scheme: bearer
      bearerFormat: JWT
    sourceKey:
      type: apiKey
      in: header
      name: X-Nirvet-Key
  schemas:
    Error:
      type: object
      properties:
        error:
          type: object
          properties:
            code: { type: string }
            message: { type: string }
    LoginRequest:
      type: object
      required: [email, password]
      properties:
        email: { type: string, format: email }
        password: { type: string }
        mfa_code: { type: string, description: "required when the user has MFA enabled" }
    LoginResult:
      type: object
      properties:
        token: { type: string }
        user: { $ref: '#/components/schemas/User' }
    User:
      type: object
      properties:
        id: { type: string, format: uuid }
        tenant_id: { type: string, format: uuid }
        email: { type: string }
        role: { type: string }
        status: { type: string }
        mfa_enabled: { type: boolean }
    IngestInput:
      type: object
      required: [source]
      properties:
        source: { type: string }
        native_id: { type: string }
        class_name: { type: string }
        activity_name: { type: string }
        severity: { type: string, enum: [informational, low, medium, high, critical] }
        confidence: { type: integer }
        actor_ref: { type: string }
        target_ref: { type: string }
        action: { type: string }
        outcome: { type: string }
        data: { type: object, additionalProperties: true }
    Alert:
      type: object
      properties:
        id: { type: string, format: uuid }
        title: { type: string }
        severity: { type: string }
        status: { type: string, enum: [new, assigned, closed, promoted] }
        source: { type: string }
        detection_id: { type: string, format: uuid }
        mitre: { type: array, items: { type: string } }
    Incident:
      type: object
      properties:
        id: { type: string, format: uuid }
        title: { type: string }
        severity: { type: string }
        stage: { type: string, enum: [new, triage, investigating, contained, closed] }
        acknowledged_at: { type: string, format: date-time, nullable: true }
        ack_due_at: { type: string, format: date-time, nullable: true, description: SLA acknowledge deadline (per-severity) }
        resolve_due_at: { type: string, format: date-time, nullable: true, description: SLA resolve deadline (per-severity) }
        ack_breached: { type: boolean, description: derived — acknowledged late or still unacknowledged past due }
        resolve_breached: { type: boolean, description: derived — closed late or still open past due }
    Asset:
      type: object
      required: [ref, name]
      properties:
        id: { type: string, format: uuid }
        ref: { type: string, description: canonical reference matching actor_ref/target_ref (e.g. host:FIN-01) }
        name: { type: string }
        kind: { type: string, enum: [host, user, service, cloud, network, other] }
        criticality: { type: string, enum: [low, medium, high, critical] }
        owner: { type: string }
        tags: { type: array, items: { type: string } }
    Vulnerability:
      type: object
      required: [ref, title]
      properties:
        ref: { type: string, description: affected asset ref }
        cve: { type: string }
        title: { type: string }
        severity: { type: string, enum: [low, medium, high, critical] }
        cvss: { type: number }
        exploited: { type: boolean, description: known-exploited / active exploitation }
        status: { type: string, enum: [open, remediating, accepted, resolved] }
        remediation_due: { type: string, format: date-time, nullable: true }
    DetectionRule:
      type: object
      properties:
        name: { type: string }
        severity: { type: string }
        mitre: { type: array, items: { type: string } }
        condition:
          type: object
          properties:
            all: { type: array, items: { $ref: '#/components/schemas/Predicate' } }
            any: { type: array, items: { $ref: '#/components/schemas/Predicate' } }
    Predicate:
      type: object
      properties:
        field: { type: string }
        op: { type: string, enum: [eq, neq, contains, gte, lte, exists, regex] }
        value: { type: string }
    PlaybookRun:
      type: object
      properties:
        id: { type: string, format: uuid }
        status: { type: string, enum: [pending_approval, running, completed, failed, rejected] }
        steps: { type: array, items: { type: object } }
security:
  - bearerAuth: []
tags:
  - { name: health }
  - { name: auth }
  - { name: sso }
  - { name: mfa }
  - { name: admin }
  - { name: ingestion }
  - { name: detection }
  - { name: alerts }
  - { name: correlation }
  - { name: incidents }
  - { name: connectors }
  - { name: soar }
  - { name: ai }
  - { name: threat-intel }
  - { name: reporting }
  - { name: compliance }
  - { name: billing }
  - { name: ticketing }
paths:
  /admin/audit:
    get:
      tags: [admin]
      summary: Search the tenant immutable audit trail (GOV-001/ADMIN-004)
      responses:
        '200': { description: OK }
        '401': { description: unauthenticated }
        '403': { description: forbidden }
  /incidents/{id}/alerts:
    get:
      tags: [incidents]
      summary: Alerts promoted into an incident (linked-alerts panel)
      parameters:
        - { name: id, in: path, required: true, schema: { type: string } }
      responses:
        '200': { description: OK }
        '400': { description: bad request, content: { application/json: { schema: { $ref: '#/components/schemas/Error' } } } }
        '401': { description: unauthenticated }
        '403': { description: forbidden }
  /healthz: { get: { tags: [health], security: [], summary: Liveness, responses: { '200': { description: ok } } } }
  /readyz: { get: { tags: [health], security: [], summary: Readiness (checks DB), responses: { '200': { description: ready }, '503': { description: db unavailable } } } }
  /admin/health: { get: { tags: [admin], summary: Platform health snapshot (aggregated liveness + runtime; padmin), responses: { '200': { description: OK }, '401': { description: unauthenticated }, '403': { description: forbidden } } } }
  /metrics: { get: { tags: [health], security: [], summary: Prometheus metrics, responses: { '200': { description: metrics } } } }
  /auth/login:
    post:
      tags: [auth]
      security: []
      summary: Authenticate (password + optional MFA). Rate-limited per IP.
      requestBody: { required: true, content: { application/json: { schema: { $ref: '#/components/schemas/LoginRequest' } } } }
      responses:
        '200': { description: token issued, content: { application/json: { schema: { $ref: '#/components/schemas/LoginResult' } } } }
        '401': { description: invalid credentials/MFA, content: { application/json: { schema: { $ref: '#/components/schemas/Error' } } } }
        '429': { description: rate limited }
  /auth/sso/start:
    get:
      tags: [sso]
      security: []
      summary: Begin OIDC login (302 to the tenant IdP). Rate-limited.
      parameters:
        - { name: connection, in: query, schema: { type: string, format: uuid }, description: SSO connection id }
        - { name: domain, in: query, schema: { type: string }, description: email domain (alternative to connection) }
      responses: { '302': { description: redirect to IdP }, '400': { description: missing connection/domain }, '404': { description: no connection } }
  /auth/sso/callback:
    get:
      tags: [sso]
      security: []
      summary: OIDC redirect callback — verifies id_token (JWKS), JIT-provisions, issues a session token
      parameters:
        - { name: code, in: query, required: true, schema: { type: string } }
        - { name: state, in: query, required: true, schema: { type: string } }
      responses:
        '200': { description: session issued, content: { application/json: { schema: { $ref: '#/components/schemas/LoginResult' } } } }
        '401': { description: token/id_token verification failed }
        '403': { description: email domain or tenant not permitted }
  /admin/sso:
    get: { tags: [sso], summary: List tenant SSO connections (tenant/platform admin), responses: { '200': { description: connections } } }
    post: { tags: [sso], summary: Create an OIDC connection (client secret sealed in vault), responses: { '201': { description: created } } }
  /admin/sso/{id}: { delete: { tags: [sso], summary: Delete an OIDC SSO connection, parameters: [{ name: id, in: path, required: true, schema: { type: string } }], responses: { '200': { description: deleted } } } }
  /auth/sso/saml/start:
    get:
      tags: [sso]
      security: []
      summary: Begin SP-initiated SAML login (302 to the IdP with an AuthnRequest). Rate-limited.
      parameters:
        - { name: connection, in: query, schema: { type: string, format: uuid } }
        - { name: domain, in: query, schema: { type: string } }
      responses: { '302': { description: redirect to IdP }, '400': { description: missing connection/domain }, '404': { description: no connection } }
  /auth/sso/saml/acs:
    post:
      tags: [sso]
      security: []
      summary: SAML Assertion Consumer Service — validates the signed SAML Response (signature/conditions/audience/InResponseTo, all fail-closed) and issues a session
      requestBody:
        required: true
        content:
          application/x-www-form-urlencoded:
            schema: { type: object, required: [SAMLResponse, RelayState], properties: { SAMLResponse: { type: string }, RelayState: { type: string } } }
      responses:
        '200': { description: session issued, content: { application/json: { schema: { $ref: '#/components/schemas/LoginResult' } } } }
        '401': { description: assertion validation failed }
        '403': { description: email domain not permitted }
  /admin/sso/saml:
    get: { tags: [sso], summary: List SAML connections (tenant/platform admin), responses: { '200': { description: connections } } }
    post: { tags: [sso], summary: Create a SAML connection (IdP entityID/SSO URL/cert + SP entityID/ACS), responses: { '201': { description: created } } }
  /admin/sso/saml/{id}: { delete: { tags: [sso], summary: Delete a SAML connection, parameters: [{ name: id, in: path, required: true, schema: { type: string } }], responses: { '200': { description: deleted } } } }
  /me: { get: { tags: [auth], summary: Current user, responses: { '200': { description: user, content: { application/json: { schema: { $ref: '#/components/schemas/User' } } } } } } }
  /me/password: { post: { tags: [auth], summary: Change own password (verifies current), requestBody: { required: true, content: { application/json: { schema: { type: object, required: [current_password, new_password], properties: { current_password: { type: string }, new_password: { type: string, minLength: 8 } } } } } }, responses: { '200': { description: changed }, '401': { description: current password incorrect } } } }
  /mfa/enroll: { post: { tags: [mfa], summary: Begin TOTP enrollment (returns otpauth URI + secret once), responses: { '200': { description: enrolled } } } }
  /mfa/activate: { post: { tags: [mfa], summary: Activate MFA with a code, responses: { '200': { description: enabled }, '400': { description: invalid code } } } }
  /mfa/disable: { post: { tags: [mfa], summary: Disable MFA (verifies a code), responses: { '200': { description: disabled } } } }
  /admin/tenants:
    get: { tags: [admin], summary: List tenants (platform_admin), responses: { '200': { description: tenants } } }
    post: { tags: [admin], summary: Create tenant (platform_admin), responses: { '201': { description: created } } }
  /admin/tenants/{id}: { get: { tags: [admin], summary: Get tenant, parameters: [{ name: id, in: path, required: true, schema: { type: string } }], responses: { '200': { description: tenant }, '404': { description: not found } } } }
  /admin/tenants/{id}/status: { post: { tags: [admin], summary: Guarded tenant status transition (platform_admin, TEN-004), parameters: [{ name: id, in: path, required: true, schema: { type: string } }], responses: { '200': { description: tenant }, '400': { description: illegal transition } } } }
  /admin/tenants/{id}/profile:
    get: { tags: [admin], summary: Get tenant org profile (TEN-006), parameters: [{ name: id, in: path, required: true, schema: { type: string } }], responses: { '200': { description: profile } } }
    put: { tags: [admin], summary: Update tenant org profile (timezone/business-hours/legal), parameters: [{ name: id, in: path, required: true, schema: { type: string } }], responses: { '200': { description: profile } } }
  /admin/tenants/{id}/escalation-contacts:
    get: { tags: [admin], summary: List escalation matrix contacts (TEN-006), parameters: [{ name: id, in: path, required: true, schema: { type: string } }], responses: { '200': { description: contacts } } }
    post: { tags: [admin], summary: Add an escalation contact, parameters: [{ name: id, in: path, required: true, schema: { type: string } }], responses: { '201': { description: created } } }
  /admin/tenants/{id}/escalation-contacts/{cid}: { delete: { tags: [admin], summary: Remove an escalation contact, parameters: [{ name: id, in: path, required: true, schema: { type: string } }, { name: cid, in: path, required: true, schema: { type: string } }], responses: { '200': { description: deleted } } } }
  /admin/tenants/{id}/authority-policies:
    get: { tags: [admin], summary: List authority-to-act policies (TEN-006/SOAR-003), parameters: [{ name: id, in: path, required: true, schema: { type: string } }], responses: { '200': { description: policies } } }
    put: { tags: [admin], summary: Upsert an authority-to-act policy (fail-closed default), parameters: [{ name: id, in: path, required: true, schema: { type: string } }], responses: { '200': { description: policy } } }
  /admin/tenants/{id}/history: { get: { tags: [admin], summary: Tenant change history (append-only, TEN-010), parameters: [{ name: id, in: path, required: true, schema: { type: string } }], responses: { '200': { description: history } } } }
  /admin/tenants/{id}/service-accounts:
    get: { tags: [admin], summary: List service accounts (IAM-001), parameters: [{ name: id, in: path, required: true, schema: { type: string } }], responses: { '200': { description: service accounts } } }
    post: { tags: [admin], summary: Create a service account (non-human principal; not platform_admin), parameters: [{ name: id, in: path, required: true, schema: { type: string } }], responses: { '201': { description: created } } }
  /admin/tenants/{id}/service-accounts/{sid}/keys:
    get: { tags: [admin], summary: List API key metadata (never the secret), parameters: [{ name: id, in: path, required: true, schema: { type: string } }, { name: sid, in: path, required: true, schema: { type: string } }], responses: { '200': { description: keys } } }
    post: { tags: [admin], summary: Mint an API key (raw key returned ONCE), parameters: [{ name: id, in: path, required: true, schema: { type: string } }, { name: sid, in: path, required: true, schema: { type: string } }], responses: { '201': { description: created with one-time key } } }
  /admin/tenants/{id}/api-keys/{kid}: { delete: { tags: [admin], summary: Revoke an API key (fail-closed on next use), parameters: [{ name: id, in: path, required: true, schema: { type: string } }, { name: kid, in: path, required: true, schema: { type: string } }], responses: { '200': { description: revoked } } } }
  /admin/tenants/{id}/session-policy:
    get: { tags: [admin], summary: Get session policy (TTL/IP allow-list/anomaly log, IAM-007), parameters: [{ name: id, in: path, required: true, schema: { type: string } }], responses: { '200': { description: policy } } }
    put: { tags: [admin], summary: Update session policy (validated TTL + IP/CIDR allow-list), parameters: [{ name: id, in: path, required: true, schema: { type: string } }], responses: { '200': { description: policy }, '400': { description: invalid TTL or allow-list entry } } }
  /me/elevations:
    get: { tags: [iam], summary: List my privileged elevations (IAM-004), responses: { '200': { description: elevations } } }
    post: { tags: [iam], summary: Request a time-bounded privileged elevation (awaits four-eyes approval), responses: { '201': { description: requested }, '400': { description: invalid target/boundary } } }
  /me/elevations/break-glass: { post: { tags: [iam], summary: Break-glass emergency elevation (immediate + alert + review-required, IAM-006), responses: { '201': { description: active } } } }
  /me/elevations/{id}/token: { post: { tags: [iam], summary: Mint a short-lived elevated token for an active elevation, parameters: [{ name: id, in: path, required: true, schema: { type: string } }], responses: { '200': { description: token }, '409': { description: not active } } } }
  /admin/elevations:
    get: { tags: [admin], summary: List all privileged elevations (manager), responses: { '200': { description: elevations } } }
  /admin/elevations/{id}/approve: { post: { tags: [admin], summary: Approve a PAM elevation (four-eyes; requester != approver), parameters: [{ name: id, in: path, required: true, schema: { type: string } }], responses: { '200': { description: active }, '403': { description: four-eyes violation }, '409': { description: not pending } } } }
  /admin/elevations/{id}/reject: { post: { tags: [admin], summary: Reject a PAM elevation, parameters: [{ name: id, in: path, required: true, schema: { type: string } }], responses: { '200': { description: rejected } } } }
  /admin/elevations/{id}/review: { post: { tags: [admin], summary: Record post-use review of a break-glass elevation (IAM-006), parameters: [{ name: id, in: path, required: true, schema: { type: string } }], responses: { '200': { description: reviewed } } } }
  /auth/invitations/accept: { post: { tags: [auth], summary: Accept an invitation and set a password (public, one-time, IAM-001/008), responses: { '201': { description: user activated }, '401': { description: invalid token }, '409': { description: expired/accepted/duplicate } } } }
  /admin/tenants/{id}/invitations:
    get: { tags: [admin], summary: List pending invitations, parameters: [{ name: id, in: path, required: true, schema: { type: string } }], responses: { '200': { description: invitations } } }
    post: { tags: [admin], summary: Create a one-time invitation (token returned ONCE; role != platform_admin), parameters: [{ name: id, in: path, required: true, schema: { type: string } }], responses: { '201': { description: created with one-time token } } }
  /admin/tenants/{id}/invitations/{iid}: { delete: { tags: [admin], summary: Revoke a pending invitation, parameters: [{ name: id, in: path, required: true, schema: { type: string } }, { name: iid, in: path, required: true, schema: { type: string } }], responses: { '200': { description: revoked } } } }
  /admin/tenants/{id}/access-review: { get: { tags: [admin], summary: Access-review report — users/MFA/last-login + service accounts + invites + active elevations (IAM-009), parameters: [{ name: id, in: path, required: true, schema: { type: string } }], responses: { '200': { description: report } } } }
  /admin/users: { post: { tags: [admin], summary: Create user (platform_admin), responses: { '201': { description: created } } } }
  /ingest:
    post:
      tags: [ingestion]
      summary: Ingest a security event (async normalize + detect)
      requestBody: { required: true, content: { application/json: { schema: { $ref: '#/components/schemas/IngestInput' } } } }
      responses: { '202': { description: accepted }, '400': { description: invalid }, '429': { description: quota exceeded } }
  /ingest/webhook/{id}:
    post:
      tags: [ingestion]
      security: [{ sourceKey: [] }]
      summary: Source-key authenticated webhook ingestion
      parameters: [{ name: id, in: path, required: true, schema: { type: string } }]
      requestBody: { required: true, content: { application/json: { schema: { type: object, properties: { events: { type: array, items: { $ref: '#/components/schemas/IngestInput' } } } } } } }
      responses: { '202': { description: accepted }, '401': { description: bad key } }
  /events: { get: { tags: [ingestion], summary: Query normalized events, parameters: [{ name: severity, in: query, schema: { type: string } }, { name: search, in: query, schema: { type: string } }, { name: limit, in: query, schema: { type: integer } }], responses: { '200': { description: events } } } }
  /detections:
    get: { tags: [detection], summary: List detection rules, responses: { '200': { description: rules } } }
    post: { tags: [detection], summary: Create rule (detection_engineer), requestBody: { content: { application/json: { schema: { $ref: '#/components/schemas/DetectionRule' } } } }, responses: { '201': { description: created } } }
  /detections/import/sigma:
    post:
      tags: [detection]
      summary: Import a Sigma rule (YAML body) — translated to the native condition model
      requestBody: { required: true, content: { application/x-yaml: { schema: { type: string } } } }
      responses: { '201': { description: rule created, content: { application/json: { schema: { $ref: '#/components/schemas/DetectionRule' } } } }, '400': { description: unsupported/invalid Sigma } }
  /detections/{id}/enabled: { post: { tags: [detection], summary: Enable/disable a rule, parameters: [{ name: id, in: path, required: true, schema: { type: string } }], responses: { '200': { description: ok } } } }
  /detections/cel:
    post:
      tags: [detection]
      summary: Create a CEL expression rule (compiled + type-checked; must yield bool)
      requestBody: { required: true, content: { application/json: { schema: { type: object, required: [name, severity, expression], properties: { name: { type: string }, description: { type: string }, severity: { type: string }, confidence: { type: integer }, mitre: { type: array, items: { type: string } }, expression: { type: string, example: 'event.severity == "critical" && event.class_name.contains("malware")' } } } } } }
      responses: { '201': { description: created }, '400': { description: invalid CEL expression } }
  /correlations: { get: { tags: [correlation], summary: Risk-ranked clusters of related alerts (§6.7), parameters: [{ name: status, in: query, schema: { type: string, enum: [open, promoted, closed] } }], responses: { '200': { description: correlations } } } }
  /correlations/{id}: { get: { tags: [correlation], summary: Get a correlation cluster, parameters: [{ name: id, in: path, required: true, schema: { type: string } }], responses: { '200': { description: correlation }, '404': { description: not found } } } }
  /alerts: { get: { tags: [alerts], summary: List alerts, parameters: [{ name: status, in: query, schema: { type: string } }], responses: { '200': { description: alerts } } } }
  /alerts/{id}: { get: { tags: [alerts], summary: Get alert, parameters: [{ name: id, in: path, required: true, schema: { type: string } }], responses: { '200': { description: alert, content: { application/json: { schema: { $ref: '#/components/schemas/Alert' } } } } } } }
  /alerts/{id}/assign: { post: { tags: [alerts], summary: Assign alert, parameters: [{ name: id, in: path, required: true, schema: { type: string } }], responses: { '200': { description: assigned } } } }
  /alerts/{id}/promote: { post: { tags: [alerts], summary: Promote alert to incident, parameters: [{ name: id, in: path, required: true, schema: { type: string } }], responses: { '201': { description: incident } } } }
  /alerts/{id}/summarise: { post: { tags: [ai], summary: AI summary of an alert (assistive), parameters: [{ name: id, in: path, required: true, schema: { type: string } }], responses: { '200': { description: summary } } } }
  /ai/copilot/sessions:
    get: { tags: [ai], summary: List the caller's copilot sessions, responses: { '200': { description: sessions } } }
    post: { tags: [ai], summary: Start a copilot investigation session, requestBody: { content: { application/json: { schema: { type: object, properties: { title: { type: string }, incident_ref: { type: string } } } } } }, responses: { '201': { description: session }, '400': { description: bad request } } }
  /ai/copilot/sessions/{id}:
    get: { tags: [ai], summary: Get a copilot session + turns, parameters: [{ name: id, in: path, required: true, schema: { type: string } }], responses: { '200': { description: session and turns }, '404': { description: not found } } }
  /ai/copilot/sessions/{id}/messages:
    post: { tags: [ai], summary: 'Post a message and get an assistive reply (redaction-fenced). When recall=true (copilot completion i3 RAG), the copilot also grounds on the most similar PAST cases from the per-tenant, RLS-confined vector store; those chunks ride the SAME completeExternal redaction chokepoint as untrusted evidence (never as instructions) and are field-visibility filtered to the caller.', parameters: [{ name: id, in: path, required: true, schema: { type: string } }], requestBody: { required: true, content: { application/json: { schema: { type: object, required: [message], properties: { message: { type: string }, recall: { type: boolean } } } } } }, responses: { '201': { description: assistant turn }, '400': { description: bad request }, '404': { description: not found } } }
  /ai/copilot/sessions/{id}/agentic-messages:
