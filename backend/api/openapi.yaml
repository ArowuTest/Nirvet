  /soar/settings:
    get:
      tags: [soar]
      summary: GET /soar/settings
      responses:
        '200': { description: OK }
        '400': { description: bad request, content: { application/json: { schema: { $ref: '#/components/schemas/Error' } } } }
        '401': { description: unauthenticated }
        '403': { description: forbidden }
    put:
      tags: [soar]
      summary: PUT /soar/settings
      description: >-
        D5 arm-gate: ENABLING destructive_enabled is refused with 409 `protected_targets_undecided` unless the
        tenant has decided about its crown jewels (see /soar/protected-targets-decision). Only the transition to
        enabled is gated — re-saving an armed tenant, and DISABLING, are always allowed.
      responses:
        '200': { description: OK }
        '400': { description: bad request, content: { application/json: { schema: { $ref: '#/components/schemas/Error' } } } }
        '401': { description: unauthenticated }
        '403': { description: forbidden }
        '409':
          description: >-
            `protected_targets_undecided` — cannot arm destructive response before the tenant's crown jewels are
            decided (an empty deny-list allows, it does not withhold).
          content: { application/json: { schema: { $ref: '#/components/schemas/Error' } } }
  /soar/protected-targets/{kind}:
    get:
      tags: [soar]
      summary: GET /soar/protected-targets/{kind}
      description: >-
        The D5 crown-jewel deny-list the blast-radius guards consult before a destructive step. Returns the
        tenant's own designations plus the instance-wide (global) ones it inherits. An EMPTY list means nothing
        is exempt from automated response — it does not withhold. Readable by any internal SOC role: it is the
        answer to "why was that containment withheld?".
      parameters:
        - name: kind
          in: path
          required: true
          schema: { type: string, enum: [host, identity] }
          description: >-
            host — matched as a case-insensitive substring of the resolved host; identity — matched EXACTLY
            against the UPN and resolved object id.
      responses:
        '200': { description: OK }
        '400': { description: bad request, content: { application/json: { schema: { $ref: '#/components/schemas/Error' } } } }
        '401': { description: unauthenticated }
        '403': { description: forbidden }
    post:
      tags: [soar]
      summary: POST /soar/protected-targets/{kind}
      description: >-
        Designate a crown jewel for the caller's tenant. TIGHTENS the blast-radius net (more refusals), so it is
        gated at soc_manager. Rejects wildcards: neither guard globs, so "*.corp.gov.gh" would match nothing and
        protect nothing.
      parameters:
        - name: kind
          in: path
          required: true
          schema: { type: string, enum: [host, identity] }
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [value]
              properties:
                value: { type: string, maxLength: 253, description: 'Host pattern (substring) or full UPN / object id (exact)' }
                note: { type: string, description: 'Why this target is a crown jewel' }
      responses:
        '201': { description: Created }
        '400': { description: bad request, content: { application/json: { schema: { $ref: '#/components/schemas/Error' } } } }
        '401': { description: unauthenticated }
        '403': { description: forbidden }
        '409': { description: already designated }
  /soar/protected-targets/{kind}/{id}:
    delete:
      tags: [soar]
      summary: DELETE /soar/protected-targets/{kind}/{id}
      description: >-
        Undesignate a crown jewel. WEAKENS the net — the target becomes auto-isolatable/disable-able again — so it
        sits a tier above the add, at platform_admin. Instance-wide (global) rows cannot be removed here.
      parameters:
        - name: kind
          in: path
          required: true
          schema: { type: string, enum: [host, identity] }
        - name: id
          in: path
          required: true
          schema: { type: string, format: uuid }
      responses:
        '204': { description: No Content }
        '400': { description: bad request, content: { application/json: { schema: { $ref: '#/components/schemas/Error' } } } }
        '401': { description: unauthenticated }
        '403': { description: forbidden }
        '404': { description: not found }
  /soar/protected-targets-decision:
    get:
      tags: [soar]
      summary: GET /soar/protected-targets-decision
      description: >-
        Whether this tenant has DECIDED about its crown jewels, and how. `target_count` counts the tenant's OWN
        designations only — inherited instance-wide rows are excluded, because those are the platform's floor and
        not the tenant's decision. `decided` is `target_count > 0 || ack != null`, and PUT /soar/settings refuses
        to ENABLE destructive response while it is false.
      responses:
        '200': { description: OK }
        '401': { description: unauthenticated }
        '403': { description: forbidden }
  /soar/protected-targets-decision/ack:
    post:
      tags: [soar]
      summary: POST /soar/protected-targets-decision/ack
      description: >-
        Record the audited attestation that this tenant deliberately designates NO crown jewels — the alternative
        to designating one, and what unblocks arming destructive response. Deliberately not a field on
        /soar/settings: an ack there could be set in the same request that flips destructive_enabled, which is a
        checkbox beside the toggle rather than a decision.
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [confirmed_with]
              properties:
                confirmed_with:
                  type: string
                  minLength: 3
                  maxLength: 200
                  description: >-
                    Who AT THE CUSTOMER confirmed there are no crown jewels. Mandatory: the SOC cannot make that
                    determination on the customer's behalf.
                note: { type: string }
      responses:
        '200': { description: OK }
        '400': { description: bad request, content: { application/json: { schema: { $ref: '#/components/schemas/Error' } } } }
        '401': { description: unauthenticated }
        '403': { description: forbidden }
    delete:
      tags: [soar]
      summary: DELETE /soar/protected-targets-decision/ack
      description: >-
        Withdraw the attestation. Re-blocks a FUTURE arm; does not disarm an already-armed tenant (a safety gate
        that can trap a tenant armed, or disarm one mid-incident, is a worse hazard than the one it guards).
      responses:
        '204': { description: No Content }
        '401': { description: unauthenticated }
        '403': { description: forbidden }
